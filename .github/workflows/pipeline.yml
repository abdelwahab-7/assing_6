name: Model Training and Deployment Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install --no-cache-dir flake8

      # Gatekeeper 1: Lightweight check must pass first
      - name: Run linter
        run: |
          flake8 . --exit-zero

  train:
    runs-on: ubuntu-latest
    needs: linter
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install dvc

      - name: Pull data with DVC
        run: |
          if [ -f "data.csv" ]; then
            echo "Data file already exists"
          else
            echo "Error: data.csv not found"
            exit 1
          fi

      - name: Train model
        run: |
          python train.py

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

      # Requirement: Upload error logs on failure
      - name: Upload error logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

      # Requirement: Final cleanup step regardless of success/failure
      - name: Cleanup step
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."

  deploy:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Check accuracy threshold
        run: |
          python check_threshold.py

      - name: Mock Docker build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: ${RUN_ID}"
          echo "Docker build simulation complete"
